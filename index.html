<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yaqin Hasan - Software Engineer - Full Stack  - Portfolio" />
    <meta name="darkreader-lock" />

    <link rel="icon" href="/favicon.ico" />

    <title>Yaqin Hasan</title>

    <style>
      html[data-theme="default-light"] {
        background: #fdf6e3;
      }
      html[data-theme="default-dark"] {
        background: #1a1d2e;
      }
      html[data-theme="futuristic-light"] {
        background: #f5f7fa;
      }
      html[data-theme="futuristic-dark"] {
        background: #0f1419;
      }
      html[data-theme="pastel-light"] {
        background: #faf8f5;
      }
      html[data-theme="pastel-dark"] {
        background: #2e303e;
      }
    </style>
    <script>
      (function () {
        var stored = localStorage.getItem("theme");
        let theme;
        // default theme based on prefers color scheme
        const prefersDark = matchMedia("(prefers-color-scheme:dark)").matches;
        const defaultTheme = prefersDark ? "default-dark" : "default-light";
        try {
          theme = JSON.parse(stored);
        } catch (e) {
          theme = stored;
        }
        var valid = ["default-light", "default-dark", "futuristic-light", "futuristic-dark", "pastel-light", "pastel-dark"];
        if (valid.indexOf(theme) === -1) {
          theme = defaultTheme;
        }
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body>
    <noscript>
      <strong> This site doesn't work properly without JavaScript enabled. Please enable it to continue. </strong>
    </noscript>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
